name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x]

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Prisma Generate
      run: npm run generate --workspace=@jiraclone/database

    - name: Build Shared Types
      run: npm run build --workspace=@jiraclone/shared

    - name: Build Auth Service
      run: npm run build --workspace=@jiraclone/auth-service

    - name: Build Org Service
      run: npm run build --workspace=@jiraclone/org-service

    - name: Build Project Service
      run: npm run build --workspace=@jiraclone/project-service

    - name: Build Task Service
      run: npm run build --workspace=@jiraclone/task-service

    - name: Build Notification Service
      run: npm run build --workspace=@jiraclone/notification-service

    - name: Build Frontend
      run: npm run build --workspace=@jiraclone/frontend

  docker-build:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build Authentication Service Image
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ./apps/auth-service/Dockerfile
        push: false
        tags: jiraclone/auth-service:latest

    # Build other images similarly...
    - name: Build Frontend Image
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ./apps/frontend/Dockerfile
        push: false
        tags: jiraclone/frontend:latest
