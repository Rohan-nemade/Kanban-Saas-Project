version: '3.8'

services:
  mysql:
    image: mysql:8
    container_name: jiraclone_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: saas_project
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: jiraclone_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:
